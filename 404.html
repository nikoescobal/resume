<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lost in the void — Nikolas Escobal</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --accent: #2563eb;
            --primary: #0f172a;
            --text: #1e293b;
            --text-light: #64748b;

            --body:    #b8a590;
            --patch:   #8a7766;
            --outline: #3f3025;
            --pink:    #f3b4c5;
            --yellow:  #f2c14e;
            --cheese:  #f6d27a;
            --crust:   #e0a965;
            --pepp:    #c94c4c;
            --cup:     #ffffff;
            --cup-dark:#d9d9d9;
            --coffee:  #6b4a36;
            --laptop:  #cbd5e1;
            --laptop-dark:#94a3b8;
            --screen:  #0f172a;
        }

        html, body {
            height: 100%;
            font-family: 'Inter', sans-serif;
            color: var(--text);
            background: radial-gradient(circle at 30% 20%, #dbeafe 0%, #ffffff 55%, #f1f5f9 100%);
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .wrap {
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
            text-align: center;
            position: relative;
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.35;
            animation: drift 18s ease-in-out infinite;
            pointer-events: none;
        }
        .blob.a { width: 420px; height: 420px; background: #2563eb; top: -80px; left: -80px; }
        .blob.b { width: 360px; height: 360px; background: #38bdf8; bottom: -100px; right: -60px; animation-delay: -6s; animation-duration: 22s; }
        .blob.c { width: 260px; height: 260px; background: #a78bfa; top: 40%; right: 20%; animation-delay: -12s; opacity: 0.25; }

        @keyframes drift {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33%      { transform: translate(80px, 40px) scale(1.15); }
            66%      { transform: translate(-40px, 60px) scale(0.9); }
        }

        .center { position: relative; z-index: 5; }

        .code {
            font-family: 'JetBrains Mono', monospace;
            font-size: clamp(120px, 22vw, 260px);
            font-weight: 800;
            letter-spacing: -0.05em;
            line-height: 1;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #0f172a 0%, #2563eb 60%, #38bdf8 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50%      { transform: translateY(-14px); }
        }

        .headline { font-size: clamp(22px, 3vw, 30px); font-weight: 700; color: var(--primary); margin-bottom: 10px; }
        .sub { font-size: 15px; color: var(--text-light); margin-bottom: 28px; max-width: 460px; line-height: 1.55; }
        .countdown { font-family: 'JetBrains Mono', monospace; color: var(--accent); font-weight: 600; }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 14px 26px;
            background: var(--accent);
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            border-radius: 8px;
            box-shadow: 0 6px 20px rgba(37, 99, 235, 0.35);
            transition: transform 0.15s, box-shadow 0.15s, background 0.15s;
        }
        .btn:hover { background: #1d4ed8; transform: translateY(-2px); box-shadow: 0 10px 28px rgba(37, 99, 235, 0.45); }
        .btn svg { width: 16px; height: 16px; animation: nudge 1.6s ease-in-out infinite; }

        @keyframes nudge {
            0%, 100% { transform: translateX(0); }
            50%      { transform: translateX(4px); }
        }

        .footer {
            position: absolute;
            bottom: 18px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            color: var(--text-light);
            font-family: 'JetBrains Mono', monospace;
            z-index: 5;
        }

        /* ===== PUSHEENS ===== */
        .pusheen { position: absolute; pointer-events: none; z-index: 2; }
        .pusheen path, .pusheen rect, .pusheen ellipse, .pusheen line, .pusheen circle { stroke-linecap: round; stroke-linejoin: round; }

        /* Typing at laptop — bottom-left */
        .p-laptop {
            bottom: 5vh; left: 3vw;
            width: clamp(260px, 30vw, 440px);
            animation: bob 3.4s ease-in-out infinite;
            transform-origin: center bottom;
        }
        .p-laptop .paw-l { transform-origin: 138px 160px; animation: tap 0.5s ease-in-out infinite; }
        .p-laptop .paw-r { transform-origin: 220px 160px; animation: tap 0.5s ease-in-out infinite; animation-delay: -0.25s; }
        .p-laptop .cursor { animation: blink 1s step-end infinite; }

        /* Pizza eating — bottom-right */
        .p-pizza {
            bottom: 6vh; right: 4vw;
            width: clamp(220px, 26vw, 360px);
            animation: munch 1.8s ease-in-out infinite;
            transform-origin: center bottom;
        }

        /* Coffee holding — top-right */
        .p-coffee {
            top: 6vh; right: 5vw;
            width: clamp(180px, 20vw, 280px);
            animation: sip 4s ease-in-out infinite;
            transform-origin: center bottom;
        }
        .p-coffee .steam { animation: steam 2.6s ease-in-out infinite; transform-origin: center bottom; opacity: 0.7; }
        .p-coffee .steam2 { animation-delay: -1.3s; }

        /* Sleeping — top-left */
        .p-sleep {
            top: 6vh; left: 4vw;
            width: clamp(180px, 20vw, 300px);
            animation: breathe 4.2s ease-in-out infinite;
            transform-origin: center bottom;
        }
        .p-sleep .z {
            fill: var(--accent);
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700;
            animation: zfloat 2.4s ease-in-out infinite;
            transform-origin: center;
        }
        .p-sleep .z2 { animation-delay: -0.8s; }
        .p-sleep .z3 { animation-delay: -1.6s; }

        @keyframes breathe {
            0%, 100% { transform: scale(1, 1); }
            50%      { transform: scale(1.02, 0.98); }
        }
        @keyframes bob {
            0%, 100% { transform: translateY(0); }
            50%      { transform: translateY(-4px); }
        }
        @keyframes tap {
            0%, 100% { transform: translateY(0); }
            50%      { transform: translateY(-5px); }
        }
        @keyframes blink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }
        @keyframes munch {
            0%, 100% { transform: scale(1, 1); }
            20%      { transform: scale(1.02, 0.97); }
            40%      { transform: scale(0.99, 1.02); }
        }
        @keyframes sip {
            0%, 100% { transform: rotate(0); }
            45%      { transform: rotate(-4deg); }
            55%      { transform: rotate(-4deg); }
        }
        @keyframes steam {
            0%   { transform: translateY(0) scale(0.6); opacity: 0; }
            30%  { opacity: 0.8; }
            100% { transform: translateY(-22px) scale(1.4); opacity: 0; }
        }
        @keyframes zfloat {
            0%   { opacity: 0; transform: translate(0, 0) scale(0.7); }
            20%  { opacity: 1; }
            100% { opacity: 0; transform: translate(14px, -30px) scale(1.3); }
        }

        @media (prefers-reduced-motion: reduce) {
            .blob, .code, .btn svg,
            .p-laptop, .p-laptop .paw-l, .p-laptop .paw-r, .p-laptop .cursor,
            .p-pizza, .p-coffee, .p-coffee .steam, .p-sleep, .p-sleep .z { animation: none; }
        }

        @media (max-width: 720px) {
            .p-coffee { display: none; }
            .p-sleep  { top: 3vh; width: 140px; }
        }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="blob a"></div>
        <div class="blob b"></div>
        <div class="blob c"></div>

        <div class="center">
            <div class="code">404</div>
            <div class="headline">This page wandered off.</div>
            <div class="sub">
                That path doesn't exist — probably a typo.
                Taking you back in <span class="countdown" id="count">5</span>s.
            </div>
            <a class="btn" href="/resume/" id="homeBtn">
                Go to Niko's resume
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M5 12h14M13 5l7 7-7 7"/>
                </svg>
            </a>
        </div>

        <!-- ============ LAPTOP PUSHEEN (typing) ============ -->
        <svg class="pusheen p-laptop" viewBox="0 0 360 240" aria-hidden="true">
            <!-- Body (sitting upright, taller shape) -->
            <path d="M60 96
                     C 60 56, 92 34, 130 34
                     L 230 34
                     C 268 34, 300 56, 300 96
                     L 300 200
                     C 300 220, 280 228, 258 228
                     L 102 228
                     C 80 228, 60 220, 60 200 Z"
                  fill="var(--body)" stroke="var(--outline)" stroke-width="4"/>
            <!-- Ears -->
            <path d="M104 38 L94 14 L130 34 Z"   fill="var(--body)" stroke="var(--outline)" stroke-width="4"/>
            <path d="M256 38 L266 14 L230 34 Z"  fill="var(--body)" stroke="var(--outline)" stroke-width="4"/>
            <!-- Head dashes -->
            <ellipse cx="160" cy="58" rx="9"   ry="3"   fill="var(--patch)"/>
            <ellipse cx="190" cy="52" rx="4.5" ry="2.5" fill="var(--patch)"/>
            <ellipse cx="220" cy="58" rx="9"   ry="3"   fill="var(--patch)"/>
            <!-- Focused eyes (half-closed, concentrating) -->
            <path d="M142 96 Q150 102 158 96" stroke="var(--outline)" stroke-width="3" fill="none"/>
            <path d="M222 96 Q230 102 238 96" stroke="var(--outline)" stroke-width="3" fill="none"/>
            <!-- Mouth -->
            <path d="M176 114 Q182 120 188 114" stroke="var(--outline)" stroke-width="2.4" fill="none"/>
            <!-- Whiskers -->
            <line x1="94"  y1="100" x2="62"  y2="92"  stroke="var(--outline)" stroke-width="2.4"/>
            <line x1="94"  y1="108" x2="58"  y2="108" stroke="var(--outline)" stroke-width="2.4"/>
            <line x1="94"  y1="116" x2="62"  y2="124" stroke="var(--outline)" stroke-width="2.4"/>
            <line x1="266" y1="100" x2="298" y2="92"  stroke="var(--outline)" stroke-width="2.4"/>
            <line x1="266" y1="108" x2="302" y2="108" stroke="var(--outline)" stroke-width="2.4"/>
            <line x1="266" y1="116" x2="298" y2="124" stroke="var(--outline)" stroke-width="2.4"/>

            <!-- Laptop base (in front of body) -->
            <rect x="106" y="172" width="148" height="14" rx="3" fill="var(--laptop)" stroke="var(--outline)" stroke-width="3"/>
            <!-- Laptop screen -->
            <rect x="114" y="118" width="132" height="58" rx="4" fill="var(--screen)" stroke="var(--outline)" stroke-width="3"/>
            <!-- Screen text lines -->
            <rect x="124" y="130" width="40" height="3" rx="1" fill="#38bdf8"/>
            <rect x="124" y="140" width="70" height="3" rx="1" fill="#94a3b8"/>
            <rect x="124" y="150" width="54" height="3" rx="1" fill="#94a3b8"/>
            <rect x="124" y="160" width="30" height="3" rx="1" fill="#94a3b8"/>
            <rect class="cursor" x="158" y="160" width="4" height="4" fill="#f8fafc"/>

            <!-- Paws typing on keyboard -->
            <ellipse class="paw-l" cx="138" cy="174" rx="14" ry="9" fill="var(--body)" stroke="var(--outline)" stroke-width="3"/>
            <ellipse class="paw-r" cx="220" cy="174" rx="14" ry="9" fill="var(--body)" stroke="var(--outline)" stroke-width="3"/>

            <!-- Foot nubs -->
            <rect x="108" y="222" width="34" height="14" rx="6" fill="var(--body)" stroke="var(--outline)" stroke-width="3"/>
            <rect x="218" y="222" width="34" height="14" rx="6" fill="var(--body)" stroke="var(--outline)" stroke-width="3"/>

            <!-- Tail curled around side -->
            <path d="M300 160 Q334 146 330 108 Q324 96 316 104 Q316 124 306 140 Q300 150 300 160 Z"
                  fill="var(--body)" stroke="var(--outline)" stroke-width="3.5"/>
            <rect x="314" y="116" width="12" height="3" rx="1" fill="var(--patch)"/>
            <rect x="318" y="128" width="12" height="3" rx="1" fill="var(--patch)"/>
        </svg>

        <!-- ============ PIZZA PUSHEEN ============ -->
        <svg class="pusheen p-pizza" viewBox="0 0 320 220" aria-hidden="true">
            <!-- Body (loaf) -->
            <path d="M28 106
                     C 28 66, 62 44, 100 44
                     L 220 44
                     C 258 44, 292 66, 292 106
                     L 292 168
                     C 292 190, 272 200, 248 200
                     L 224 200 L 224 210 Q 224 218 216 218 Q 208 218 208 210 L 208 200
                     L 180 200 L 180 210 Q 180 218 172 218 Q 164 218 164 210 L 164 200
                     L 136 200 L 136 210 Q 136 218 128 218 Q 120 218 120 210 L 120 200
                     L 92 200  L 92 210  Q 92 218 84 218  Q 76 218 76 210  L 76 200
                     L 72 200
                     C 48 200, 28 190, 28 168 Z"
                  fill="var(--body)" stroke="var(--outline)" stroke-width="4"/>

            <!-- Ears -->
            <path d="M74 48 L64 22 L96 42 Z"    fill="var(--body)" stroke="var(--outline)" stroke-width="4"/>
            <path d="M246 48 L256 22 L224 42 Z" fill="var(--body)" stroke="var(--outline)" stroke-width="4"/>

            <!-- Back patch -->
            <ellipse cx="234" cy="98" rx="30" ry="20" fill="var(--patch)"/>

            <!-- Head dashes -->
            <ellipse cx="128" cy="66" rx="8"   ry="3"   fill="var(--patch)"/>
            <ellipse cx="158" cy="60" rx="4"   ry="2.5" fill="var(--patch)"/>
            <ellipse cx="188" cy="66" rx="8"   ry="3"   fill="var(--patch)"/>

            <!-- Eyes (happy squint) -->
            <path d="M112 104 Q120 96 128 104" stroke="var(--outline)" stroke-width="3" fill="none"/>
            <path d="M190 104 Q198 96 206 104" stroke="var(--outline)" stroke-width="3" fill="none"/>

            <!-- Open mouth mid-chew -->
            <ellipse cx="159" cy="126" rx="6" ry="4" fill="var(--outline)"/>

            <!-- Whiskers -->
            <line x1="62"  y1="108" x2="30"  y2="100" stroke="var(--outline)" stroke-width="2.4"/>
            <line x1="62"  y1="116" x2="26"  y2="116" stroke="var(--outline)" stroke-width="2.4"/>
            <line x1="62"  y1="124" x2="30"  y2="132" stroke="var(--outline)" stroke-width="2.4"/>
            <line x1="258" y1="108" x2="290" y2="100" stroke="var(--outline)" stroke-width="2.4"/>
            <line x1="258" y1="116" x2="294" y2="116" stroke="var(--outline)" stroke-width="2.4"/>
            <line x1="258" y1="124" x2="290" y2="132" stroke="var(--outline)" stroke-width="2.4"/>

            <!-- Pizza slice held in paw -->
            <path d="M82 146 L116 144 L100 190 Z" fill="var(--cheese)" stroke="var(--outline)" stroke-width="3"/>
            <path d="M82 146 L116 144 L114 150 L84 152 Z" fill="var(--crust)" stroke="var(--outline)" stroke-width="3"/>
            <circle cx="96" cy="162" r="4.5" fill="var(--pepp)" stroke="var(--outline)" stroke-width="2"/>
            <circle cx="106" cy="170" r="3.5" fill="var(--pepp)" stroke="var(--outline)" stroke-width="2"/>
            <!-- Paw holding pizza -->
            <ellipse cx="80" cy="156" rx="14" ry="10" fill="var(--body)" stroke="var(--outline)" stroke-width="3"/>
        </svg>

        <!-- ============ COFFEE PUSHEEN ============ -->
        <svg class="pusheen p-coffee" viewBox="0 0 280 220" aria-hidden="true">
            <!-- Steam -->
            <path class="steam"  d="M170 14 Q178 2 166 -10 Q160 -20 170 -28" stroke="var(--cup-dark)" stroke-width="3" fill="none"/>
            <path class="steam steam2" d="M194 18 Q186 6 198 -8 Q204 -18 194 -26" stroke="var(--cup-dark)" stroke-width="3" fill="none"/>

            <!-- Body (upright sitting) -->
            <path d="M40 100
                     C 40 60, 72 40, 110 40
                     L 180 40
                     C 218 40, 250 60, 250 100
                     L 250 188
                     C 250 208, 230 216, 208 216
                     L 82 216
                     C 60 216, 40 208, 40 188 Z"
                  fill="var(--body)" stroke="var(--outline)" stroke-width="4"/>

            <!-- Ears -->
            <path d="M86 44 L76 18 L110 40 Z"   fill="var(--body)" stroke="var(--outline)" stroke-width="4"/>
            <path d="M204 44 L214 18 L180 40 Z" fill="var(--body)" stroke="var(--outline)" stroke-width="4"/>

            <!-- Back patch -->
            <ellipse cx="200" cy="92" rx="26" ry="18" fill="var(--patch)"/>

            <!-- Head dashes -->
            <ellipse cx="126" cy="60" rx="8" ry="3" fill="var(--patch)"/>
            <ellipse cx="154" cy="54" rx="4" ry="2.5" fill="var(--patch)"/>
            <ellipse cx="178" cy="60" rx="8" ry="3" fill="var(--patch)"/>

            <!-- Eyes -->
            <ellipse cx="112" cy="98" rx="5" ry="7" fill="var(--outline)"/>
            <ellipse cx="192" cy="98" rx="5" ry="7" fill="var(--outline)"/>

            <!-- Sipping mouth -->
            <ellipse cx="152" cy="120" rx="5" ry="3.5" fill="var(--outline)"/>

            <!-- Whiskers -->
            <line x1="74"  y1="102" x2="44"  y2="94"  stroke="var(--outline)" stroke-width="2.4"/>
            <line x1="74"  y1="110" x2="40"  y2="110" stroke="var(--outline)" stroke-width="2.4"/>
            <line x1="74"  y1="118" x2="44"  y2="126" stroke="var(--outline)" stroke-width="2.4"/>
            <line x1="216" y1="102" x2="246" y2="94"  stroke="var(--outline)" stroke-width="2.4"/>
            <line x1="216" y1="110" x2="250" y2="110" stroke="var(--outline)" stroke-width="2.4"/>
            <line x1="216" y1="118" x2="246" y2="126" stroke="var(--outline)" stroke-width="2.4"/>

            <!-- Coffee cup held in both paws -->
            <path d="M134 144 L182 144 L178 196 L138 196 Z" fill="var(--cup)" stroke="var(--outline)" stroke-width="3.5"/>
            <path d="M134 144 L182 144 L180 154 L136 154 Z" fill="var(--coffee)" stroke="var(--outline)" stroke-width="3.5"/>
            <!-- Cup handle -->
            <path d="M182 158 Q200 162 198 178 Q196 192 180 190" fill="none" stroke="var(--outline)" stroke-width="3.5"/>
            <!-- Paws holding cup -->
            <ellipse cx="132" cy="178" rx="12" ry="9" fill="var(--body)" stroke="var(--outline)" stroke-width="3"/>
            <ellipse cx="184" cy="178" rx="12" ry="9" fill="var(--body)" stroke="var(--outline)" stroke-width="3"/>
        </svg>

        <!-- ============ SLEEPING PUSHEEN ============ -->
        <svg class="pusheen p-sleep" viewBox="0 0 300 180" aria-hidden="true">
            <!-- Body (long flat loaf) -->
            <path d="M24 110
                     C 24 70, 58 50, 96 50
                     L 204 50
                     C 242 50, 276 70, 276 110
                     L 276 162
                     C 276 176, 260 182, 240 182
                     L 60 182
                     C 40 182, 24 176, 24 162 Z"
                  fill="var(--body)" stroke="var(--outline)" stroke-width="4"/>

            <!-- Ears (down-ish) -->
            <path d="M72 54 L60 32 L96 50 Z"    fill="var(--body)" stroke="var(--outline)" stroke-width="4"/>
            <path d="M228 54 L240 32 L204 50 Z" fill="var(--body)" stroke="var(--outline)" stroke-width="4"/>

            <!-- Back patch -->
            <ellipse cx="208" cy="96" rx="32" ry="20" fill="var(--patch)"/>

            <!-- Head dashes -->
            <ellipse cx="116" cy="72" rx="8" ry="3" fill="var(--patch)"/>
            <ellipse cx="146" cy="66" rx="4" ry="2.5" fill="var(--patch)"/>
            <ellipse cx="176" cy="72" rx="8" ry="3" fill="var(--patch)"/>

            <!-- Closed eyes -->
            <path d="M98  104 Q106 112 114 104" stroke="var(--outline)" stroke-width="2.8" fill="none"/>
            <path d="M178 104 Q186 112 194 104" stroke="var(--outline)" stroke-width="2.8" fill="none"/>

            <!-- Mouth -->
            <path d="M140 126 Q146 132 152 126" stroke="var(--outline)" stroke-width="2.4" fill="none"/>

            <!-- Whiskers -->
            <line x1="60"  y1="110" x2="28"  y2="102" stroke="var(--outline)" stroke-width="2.4"/>
            <line x1="60"  y1="118" x2="24"  y2="118" stroke="var(--outline)" stroke-width="2.4"/>
            <line x1="60"  y1="126" x2="28"  y2="134" stroke="var(--outline)" stroke-width="2.4"/>
            <line x1="240" y1="110" x2="272" y2="102" stroke="var(--outline)" stroke-width="2.4"/>
            <line x1="240" y1="118" x2="276" y2="118" stroke="var(--outline)" stroke-width="2.4"/>
            <line x1="240" y1="126" x2="272" y2="134" stroke="var(--outline)" stroke-width="2.4"/>

            <!-- Zs -->
            <text class="z"  x="220" y="42" font-size="20">z</text>
            <text class="z z2" x="240" y="28" font-size="24">z</text>
            <text class="z z3" x="262" y="12" font-size="28">z</text>
        </svg>

        <div class="footer">nikoescobal.github.io</div>
    </div>

    <script>
        var n = 5;
        var el = document.getElementById('count');
        var timer = setInterval(function () {
            n -= 1;
            if (n <= 0) {
                clearInterval(timer);
                window.location.href = '/resume/';
            } else {
                el.textContent = n;
            }
        }, 1000);
    </script>
</body>
</html>
