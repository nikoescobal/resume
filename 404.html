<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lost in the void — Nikolas Escobal</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --accent: #2563eb;
            --primary: #0f172a;
            --text: #1e293b;
            --text-light: #64748b;

            /* Pusheen palette */
            --body:    #b8a590;
            --patch:   #8a7766;
            --outline: #3f3025;
        }

        html, body {
            height: 100%;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            color: var(--text);
            background: radial-gradient(circle at 30% 20%, #dbeafe 0%, #ffffff 55%, #f1f5f9 100%);
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .wrap {
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
            text-align: center;
            position: relative;
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.35;
            animation: drift 18s ease-in-out infinite;
            pointer-events: none;
        }
        .blob.a { width: 420px; height: 420px; background: #2563eb; top: -80px; left: -80px; }
        .blob.b { width: 360px; height: 360px; background: #38bdf8; bottom: -100px; right: -60px; animation-delay: -6s; animation-duration: 22s; }
        .blob.c { width: 260px; height: 260px; background: #a78bfa; top: 40%; right: 20%; animation-delay: -12s; opacity: 0.25; }

        @keyframes drift {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33%      { transform: translate(80px, 40px) scale(1.15); }
            66%      { transform: translate(-40px, 60px) scale(0.9); }
        }

        .center { position: relative; z-index: 5; }

        .code {
            font-family: 'JetBrains Mono', monospace;
            font-size: clamp(120px, 22vw, 260px);
            font-weight: 800;
            color: var(--primary);
            letter-spacing: -0.05em;
            line-height: 1;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #0f172a 0%, #2563eb 60%, #38bdf8 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50%      { transform: translateY(-14px); }
        }

        .headline { font-size: clamp(22px, 3vw, 30px); font-weight: 700; color: var(--primary); margin-bottom: 10px; }
        .sub      { font-size: 15px; color: var(--text-light); margin-bottom: 28px; max-width: 460px; line-height: 1.55; }
        .countdown { font-family: 'JetBrains Mono', monospace; color: var(--accent); font-weight: 600; }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 14px 26px;
            background: var(--accent);
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            border-radius: 8px;
            box-shadow: 0 6px 20px rgba(37, 99, 235, 0.35);
            transition: transform 0.15s, box-shadow 0.15s, background 0.15s;
        }
        .btn:hover { background: #1d4ed8; transform: translateY(-2px); box-shadow: 0 10px 28px rgba(37, 99, 235, 0.45); }
        .btn svg { width: 16px; height: 16px; animation: nudge 1.6s ease-in-out infinite; }

        @keyframes nudge {
            0%, 100% { transform: translateX(0); }
            50%      { transform: translateX(4px); }
        }

        .footer {
            position: absolute;
            bottom: 18px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            color: var(--text-light);
            font-family: 'JetBrains Mono', monospace;
            z-index: 5;
        }

        /* ===== PUSHEEN ===== */
        .pusheen {
            position: absolute;
            pointer-events: none;
            z-index: 2;
        }
        .pusheen path,
        .pusheen rect,
        .pusheen ellipse,
        .pusheen line { stroke-linecap: round; stroke-linejoin: round; }

        .p-main {
            bottom: 6vh;
            left: 4vw;
            width: clamp(240px, 28vw, 420px);
            animation: breathe 3.8s ease-in-out infinite;
            transform-origin: center bottom;
        }
        .p-main .tail-tip { transform-origin: 300px 120px; animation: tail-wag 2.4s ease-in-out infinite; }

        .p-sleep {
            bottom: 5vh;
            right: 4vw;
            width: clamp(220px, 26vw, 380px);
            animation: breathe 4.4s ease-in-out infinite;
            transform-origin: center bottom;
        }
        .p-sleep .z {
            fill: var(--accent);
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700;
            animation: zfloat 2.4s ease-in-out infinite;
            transform-origin: center;
        }
        .p-sleep .z2 { animation-delay: -0.8s; }
        .p-sleep .z3 { animation-delay: -1.6s; }

        .p-fly {
            top: 8vh;
            right: 5vw;
            width: clamp(170px, 18vw, 260px);
            animation: fly 6s ease-in-out infinite;
        }
        .p-fly .wing-l, .p-fly .wing-r {
            transform-origin: center;
            animation: flap 0.6s ease-in-out infinite;
        }
        .p-fly .wing-r { animation-delay: -0.3s; }

        .p-peek {
            top: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: clamp(160px, 16vw, 240px);
            animation: peek 8s ease-in-out infinite;
            transform-origin: top center;
        }

        @keyframes breathe {
            0%, 100% { transform: scale(1, 1); }
            50%      { transform: scale(1.02, 0.98); }
        }
        @keyframes tail-wag {
            0%, 100% { transform: rotate(-4deg); }
            50%      { transform: rotate(12deg); }
        }
        @keyframes zfloat {
            0%   { opacity: 0; transform: translate(0, 0) scale(0.7); }
            20%  { opacity: 1; }
            100% { opacity: 0; transform: translate(16px, -34px) scale(1.3); }
        }
        @keyframes fly {
            0%, 100% { transform: translateY(0) rotate(-2deg); }
            50%      { transform: translateY(-18px) rotate(3deg); }
        }
        @keyframes flap {
            0%, 100% { transform: scaleY(1); }
            50%      { transform: scaleY(0.4); }
        }
        @keyframes peek {
            0%, 25%, 75%, 100% { transform: translate(-50%, -80%); }
            40%, 60%           { transform: translate(-50%, 0); }
        }

        @media (prefers-reduced-motion: reduce) {
            .blob, .code, .btn svg,
            .p-main, .p-main .tail-tip,
            .p-sleep, .p-sleep .z,
            .p-fly, .p-fly .wing-l, .p-fly .wing-r,
            .p-peek { animation: none; }
        }

        @media (max-width: 680px) {
            .p-fly { display: none; }
            .p-main { left: 2vw; }
            .p-sleep { right: 2vw; }
        }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="blob a"></div>
        <div class="blob b"></div>
        <div class="blob c"></div>

        <!-- Peek Pusheen -->
        <svg class="pusheen p-peek" viewBox="0 0 240 180" aria-hidden="true">
            <!-- Ears -->
            <path d="M58 56 L46 22 L86 48 Z" fill="var(--body)" stroke="var(--outline)" stroke-width="4"/>
            <path d="M182 56 L194 22 L154 48 Z" fill="var(--body)" stroke="var(--outline)" stroke-width="4"/>
            <!-- Head/body peek -->
            <path d="M20 80 C20 52, 56 40, 120 40 C184 40, 220 52, 220 80 L220 180 L20 180 Z"
                  fill="var(--body)" stroke="var(--outline)" stroke-width="4"/>
            <!-- 3 head dashes -->
            <ellipse cx="92"  cy="64" rx="8" ry="3" fill="var(--patch)"/>
            <ellipse cx="120" cy="58" rx="4" ry="2.5" fill="var(--patch)"/>
            <ellipse cx="148" cy="64" rx="8" ry="3" fill="var(--patch)"/>
            <!-- Eyes -->
            <ellipse cx="80"  cy="96" rx="5" ry="7" fill="var(--outline)"/>
            <ellipse cx="160" cy="96" rx="5" ry="7" fill="var(--outline)"/>
            <!-- Mouth -->
            <path d="M108 116 Q114 122 120 116 Q126 122 132 116" stroke="var(--outline)" stroke-width="2.2" fill="none"/>
            <!-- Whiskers -->
            <line x1="54" y1="102" x2="22"  y2="94"  stroke="var(--outline)" stroke-width="2.2"/>
            <line x1="54" y1="110" x2="20"  y2="110" stroke="var(--outline)" stroke-width="2.2"/>
            <line x1="54" y1="118" x2="22"  y2="126" stroke="var(--outline)" stroke-width="2.2"/>
            <line x1="186" y1="102" x2="218" y2="94"  stroke="var(--outline)" stroke-width="2.2"/>
            <line x1="186" y1="110" x2="220" y2="110" stroke="var(--outline)" stroke-width="2.2"/>
            <line x1="186" y1="118" x2="218" y2="126" stroke="var(--outline)" stroke-width="2.2"/>
        </svg>

        <div class="center">
            <div class="code">404</div>
            <div class="headline">This page wandered off.</div>
            <div class="sub">
                That path doesn't exist — probably a typo.
                Taking you back in <span class="countdown" id="count">5</span>s.
            </div>
            <a class="btn" href="/resume/" id="homeBtn">
                Go to Niko's resume
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M5 12h14M13 5l7 7-7 7"/>
                </svg>
            </a>
        </div>

        <!-- Classic standing Pusheen (bottom-left) -->
        <svg class="pusheen p-main" viewBox="0 0 340 220" aria-hidden="true">
            <!-- Tail -->
            <g class="tail-tip">
                <path d="M298 134 Q334 114 326 70 Q322 58 314 62 Q314 80 300 96 Q292 106 292 120 Z"
                      fill="var(--body)" stroke="var(--outline)" stroke-width="4"/>
                <rect x="306" y="76" width="14" height="4" rx="1.5" fill="var(--patch)"/>
                <rect x="310" y="88" width="14" height="4" rx="1.5" fill="var(--patch)"/>
                <rect x="302" y="100" width="14" height="4" rx="1.5" fill="var(--patch)"/>
            </g>

            <!-- Body (wide loaf) -->
            <path d="M24 98
                     C 24 58, 58 36, 96 36
                     L 244 36
                     C 282 36, 316 58, 316 98
                     L 316 158
                     C 316 180, 294 192, 270 192
                     L 248 192
                     L 248 202 Q 248 212 238 212 Q 228 212 228 202 L 228 192
                     L 200 192
                     L 200 202 Q 200 212 190 212 Q 180 212 180 202 L 180 192
                     L 152 192
                     L 152 202 Q 152 212 142 212 Q 132 212 132 202 L 132 192
                     L 104 192
                     L 104 202 Q 104 212 94 212 Q 84 212 84 202 L 84 192
                     L 72 192
                     C 46 192, 24 180, 24 158 Z"
                  fill="var(--body)" stroke="var(--outline)" stroke-width="4"/>

            <!-- Ears -->
            <path d="M72 40 L60 14 L96 36 Z"   fill="var(--body)" stroke="var(--outline)" stroke-width="4"/>
            <path d="M268 40 L280 14 L244 36 Z" fill="var(--body)" stroke="var(--outline)" stroke-width="4"/>

            <!-- Back patch -->
            <ellipse cx="248" cy="88" rx="34" ry="22" fill="var(--patch)"/>

            <!-- Head dashes -->
            <ellipse cx="138" cy="60" rx="9" ry="3" fill="var(--patch)"/>
            <ellipse cx="170" cy="54" rx="4.5" ry="2.5" fill="var(--patch)"/>
            <ellipse cx="202" cy="60" rx="9" ry="3" fill="var(--patch)"/>

            <!-- Eyes -->
            <ellipse cx="122" cy="96" rx="5.5" ry="7.5" fill="var(--outline)"/>
            <ellipse cx="218" cy="96" rx="5.5" ry="7.5" fill="var(--outline)"/>

            <!-- Mouth -->
            <path d="M160 118 Q166 126 172 118 Q178 126 184 118" stroke="var(--outline)" stroke-width="2.4" fill="none"/>

            <!-- Whiskers -->
            <line x1="60"  y1="100" x2="28"  y2="92"  stroke="var(--outline)" stroke-width="2.4"/>
            <line x1="60"  y1="108" x2="24"  y2="108" stroke="var(--outline)" stroke-width="2.4"/>
            <line x1="60"  y1="116" x2="28"  y2="124" stroke="var(--outline)" stroke-width="2.4"/>
            <line x1="280" y1="100" x2="312" y2="92"  stroke="var(--outline)" stroke-width="2.4"/>
            <line x1="280" y1="108" x2="316" y2="108" stroke="var(--outline)" stroke-width="2.4"/>
            <line x1="280" y1="116" x2="312" y2="124" stroke="var(--outline)" stroke-width="2.4"/>
        </svg>

        <!-- Sleeping Pusheen (bottom-right) -->
        <svg class="pusheen p-sleep" viewBox="0 0 340 200" aria-hidden="true">
            <!-- Body (loaf, no feet visible — sleeping flat) -->
            <path d="M24 110
                     C 24 70, 58 50, 96 50
                     L 244 50
                     C 282 50, 316 70, 316 110
                     L 316 170
                     C 316 188, 298 194, 276 194
                     L 64 194
                     C 42 194, 24 188, 24 170 Z"
                  fill="var(--body)" stroke="var(--outline)" stroke-width="4"/>

            <!-- Ears -->
            <path d="M72 54 L60 28 L96 50 Z"   fill="var(--body)" stroke="var(--outline)" stroke-width="4"/>
            <path d="M268 54 L280 28 L244 50 Z" fill="var(--body)" stroke="var(--outline)" stroke-width="4"/>

            <!-- Back patch -->
            <ellipse cx="242" cy="100" rx="38" ry="22" fill="var(--patch)"/>

            <!-- Head dashes -->
            <ellipse cx="138" cy="74" rx="9" ry="3" fill="var(--patch)"/>
            <ellipse cx="170" cy="68" rx="4.5" ry="2.5" fill="var(--patch)"/>
            <ellipse cx="202" cy="74" rx="9" ry="3" fill="var(--patch)"/>

            <!-- Closed eyes (curves) -->
            <path d="M114 108 Q122 116 130 108" stroke="var(--outline)" stroke-width="2.6" fill="none"/>
            <path d="M210 108 Q218 116 226 108" stroke="var(--outline)" stroke-width="2.6" fill="none"/>

            <!-- Mouth -->
            <path d="M160 130 Q166 138 172 130 Q178 138 184 130" stroke="var(--outline)" stroke-width="2.4" fill="none"/>

            <!-- Whiskers -->
            <line x1="60"  y1="112" x2="28"  y2="104" stroke="var(--outline)" stroke-width="2.4"/>
            <line x1="60"  y1="120" x2="24"  y2="120" stroke="var(--outline)" stroke-width="2.4"/>
            <line x1="60"  y1="128" x2="28"  y2="136" stroke="var(--outline)" stroke-width="2.4"/>
            <line x1="280" y1="112" x2="312" y2="104" stroke="var(--outline)" stroke-width="2.4"/>
            <line x1="280" y1="120" x2="316" y2="120" stroke="var(--outline)" stroke-width="2.4"/>
            <line x1="280" y1="128" x2="312" y2="136" stroke="var(--outline)" stroke-width="2.4"/>

            <!-- Zs -->
            <text class="z"  x="248" y="40" font-size="22">z</text>
            <text class="z z2" x="268" y="24" font-size="26">z</text>
            <text class="z z3" x="290" y="6"  font-size="30">z</text>
        </svg>

        <!-- Flying Pusheen (top-right) -->
        <svg class="pusheen p-fly" viewBox="0 0 260 180" aria-hidden="true">
            <!-- Wings -->
            <ellipse class="wing-l" cx="54"  cy="70" rx="30" ry="16" fill="#fff" stroke="var(--outline)" stroke-width="3"/>
            <ellipse class="wing-r" cx="206" cy="70" rx="30" ry="16" fill="#fff" stroke="var(--outline)" stroke-width="3"/>

            <!-- Tail -->
            <path d="M226 108 Q252 96 244 66 Q240 56 232 60 Q232 74 222 86 Q216 92 216 100 Z"
                  fill="var(--body)" stroke="var(--outline)" stroke-width="3.5"/>
            <rect x="234" y="70" width="10" height="3" rx="1" fill="var(--patch)"/>
            <rect x="236" y="80" width="10" height="3" rx="1" fill="var(--patch)"/>

            <!-- Body -->
            <path d="M30 90
                     C 30 60, 58 44, 88 44
                     L 172 44
                     C 202 44, 230 60, 230 90
                     L 230 132
                     C 230 150, 212 158, 194 158
                     L 180 158 L 180 166 Q 180 174 172 174 Q 164 174 164 166 L 164 158
                     L 140 158 L 140 166 Q 140 174 132 174 Q 124 174 124 166 L 124 158
                     L 100 158 L 100 166 Q 100 174 92 174 Q 84 174 84 166 L 84 158
                     L 66 158
                     C 48 158, 30 150, 30 132 Z"
                  fill="var(--body)" stroke="var(--outline)" stroke-width="3.5"/>

            <!-- Ears -->
            <path d="M66 48 L58 28 L84 44 Z"   fill="var(--body)" stroke="var(--outline)" stroke-width="3.5"/>
            <path d="M194 48 L202 28 L176 44 Z" fill="var(--body)" stroke="var(--outline)" stroke-width="3.5"/>

            <!-- Back patch -->
            <ellipse cx="178" cy="86" rx="24" ry="16" fill="var(--patch)"/>

            <!-- Head dashes -->
            <ellipse cx="102" cy="64" rx="7" ry="2.5" fill="var(--patch)"/>
            <ellipse cx="128" cy="58" rx="3.5" ry="2" fill="var(--patch)"/>
            <ellipse cx="154" cy="64" rx="7" ry="2.5" fill="var(--patch)"/>

            <!-- Eyes -->
            <ellipse cx="92"  cy="94" rx="4.5" ry="6" fill="var(--outline)"/>
            <ellipse cx="164" cy="94" rx="4.5" ry="6" fill="var(--outline)"/>

            <!-- Mouth -->
            <path d="M118 112 Q124 118 130 112 Q136 118 142 112" stroke="var(--outline)" stroke-width="2" fill="none"/>
        </svg>

        <div class="footer">nikoescobal.github.io</div>
    </div>

    <script>
        var n = 5;
        var el = document.getElementById('count');
        var timer = setInterval(function () {
            n -= 1;
            if (n <= 0) {
                clearInterval(timer);
                window.location.href = '/resume/';
            } else {
                el.textContent = n;
            }
        }, 1000);
    </script>
</body>
</html>
