<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lost in the void — Nikolas Escobal</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary: #0f172a;
            --accent: #2563eb;
            --text: #1e293b;
            --text-light: #64748b;
            --cat: #d1d5db;
            --cat-stripe: #9ca3af;
            --cat-paw: #e5e7eb;
            --cat-dark: #6b7280;
            --cat-eye: #111827;
            --cat-blush: #fca5a5;
        }

        html, body {
            height: 100%;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            color: var(--text);
            background: radial-gradient(circle at 30% 20%, #dbeafe 0%, #ffffff 55%, #f1f5f9 100%);
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .wrap {
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
            text-align: center;
            position: relative;
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.35;
            animation: drift 18s ease-in-out infinite;
            pointer-events: none;
        }
        .blob.a { width: 420px; height: 420px; background: #2563eb; top: -80px; left: -80px; }
        .blob.b { width: 360px; height: 360px; background: #38bdf8; bottom: -100px; right: -60px; animation-delay: -6s; animation-duration: 22s; }
        .blob.c { width: 260px; height: 260px; background: #a78bfa; top: 40%; right: 20%; animation-delay: -12s; opacity: 0.25; }

        @keyframes drift {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33%      { transform: translate(80px, 40px) scale(1.15); }
            66%      { transform: translate(-40px, 60px) scale(0.9); }
        }

        .center { position: relative; z-index: 5; }

        .code {
            font-family: 'JetBrains Mono', monospace;
            font-size: clamp(120px, 22vw, 260px);
            font-weight: 800;
            color: var(--primary);
            letter-spacing: -0.05em;
            line-height: 1;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #0f172a 0%, #2563eb 60%, #38bdf8 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50%      { transform: translateY(-14px); }
        }

        .headline {
            font-size: clamp(22px, 3vw, 30px);
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 10px;
        }

        .sub {
            font-size: 15px;
            color: var(--text-light);
            margin-bottom: 28px;
            max-width: 460px;
            line-height: 1.55;
        }

        .countdown {
            font-family: 'JetBrains Mono', monospace;
            color: var(--accent);
            font-weight: 600;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 14px 26px;
            background: var(--accent);
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            border-radius: 8px;
            box-shadow: 0 6px 20px rgba(37, 99, 235, 0.35);
            transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
        }

        .btn:hover {
            background: #1d4ed8;
            transform: translateY(-2px);
            box-shadow: 0 10px 28px rgba(37, 99, 235, 0.45);
        }

        .btn svg {
            width: 16px;
            height: 16px;
            animation: nudge 1.6s ease-in-out infinite;
        }

        @keyframes nudge {
            0%, 100% { transform: translateX(0); }
            50%      { transform: translateX(4px); }
        }

        .footer {
            position: absolute;
            bottom: 18px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            color: var(--text-light);
            font-family: 'JetBrains Mono', monospace;
            z-index: 5;
        }

        /* ===== PUSHEEN-STYLE CATS ===== */
        .cat {
            position: absolute;
            pointer-events: none;
            z-index: 2;
        }

        .cat .body, .cat .head { fill: var(--cat); }
        .cat .stripe { fill: var(--cat-stripe); }
        .cat .paw    { fill: var(--cat-paw); }
        .cat .ear    { fill: var(--cat-dark); }
        .cat .eye    { fill: var(--cat-eye); }
        .cat .blush  { fill: var(--cat-blush); opacity: 0.7; }
        .cat .mouth  { stroke: var(--cat-eye); stroke-width: 1.4; fill: none; stroke-linecap: round; }
        .cat .tail   { fill: var(--cat); }

        /* Loaf cat — bottom-left, chilling */
        .cat-loaf { bottom: 4vh; left: 3vw; width: clamp(180px, 20vw, 280px); animation: breathe 3.8s ease-in-out infinite; transform-origin: center bottom; }

        /* Sleeping belly-up cat — bottom-right */
        .cat-belly { bottom: 3vh; right: 4vw; width: clamp(200px, 22vw, 320px); animation: breathe 4.2s ease-in-out infinite; transform-origin: center bottom; }
        .cat-belly .z {
            fill: var(--accent);
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700;
            animation: zfloat 2.4s ease-in-out infinite;
            transform-origin: center;
        }
        .cat-belly .z2 { animation-delay: -0.8s; }
        .cat-belly .z3 { animation-delay: -1.6s; }

        /* Sitting pusheen — top-left, bobbing */
        .cat-sit { top: 4vh; left: 4vw; width: clamp(150px, 16vw, 230px); animation: bob 3s ease-in-out infinite; transform-origin: center bottom; }
        .cat-sit .tail { transform-origin: 65% 60%; animation: tail-flick 2.2s ease-in-out infinite; }

        /* Rolling pusheen — top-right, swaying */
        .cat-roll { top: 6vh; right: 5vw; width: clamp(170px, 18vw, 260px); animation: sway 4.6s ease-in-out infinite; transform-origin: center; }

        /* Walking pusheen — crosses full width */
        .cat-walk { bottom: 46vh; left: -260px; width: clamp(140px, 15vw, 220px); animation: walk-across 26s linear infinite; }

        /* Mini peek from top center */
        .cat-peek { top: -6px; left: 50%; transform: translateX(-50%); width: clamp(110px, 12vw, 180px); animation: peek 8s ease-in-out infinite; transform-origin: top center; }
        .cat-peek .pupil { fill: var(--cat-eye); animation: blink 5s infinite; transform-origin: center; }

        @keyframes breathe {
            0%, 100% { transform: scale(1, 1); }
            50%      { transform: scale(1.03, 0.98); }
        }
        @keyframes bob {
            0%, 100% { transform: translateY(0); }
            50%      { transform: translateY(-6px); }
        }
        @keyframes sway {
            0%, 100% { transform: rotate(-5deg); }
            50%      { transform: rotate(5deg); }
        }
        @keyframes tail-flick {
            0%, 100% { transform: rotate(-8deg); }
            50%      { transform: rotate(16deg); }
        }
        @keyframes zfloat {
            0%   { opacity: 0; transform: translate(0, 0) scale(0.7); }
            20%  { opacity: 1; }
            100% { opacity: 0; transform: translate(14px, -32px) scale(1.2); }
        }
        @keyframes walk-across {
            0%   { transform: translateX(0); }
            48%  { transform: translateX(calc(100vw + 300px)); }
            50%  { transform: translateX(calc(100vw + 300px)) scaleX(-1); }
            98%  { transform: translateX(0) scaleX(-1); }
            100% { transform: translateX(0); }
        }
        @keyframes peek {
            0%, 25%, 75%, 100% { transform: translate(-50%, -75%); }
            40%, 60%           { transform: translate(-50%, 0); }
        }
        @keyframes blink {
            0%, 94%, 100% { transform: scaleY(1); }
            97%           { transform: scaleY(0.1); }
        }

        @media (prefers-reduced-motion: reduce) {
            .blob, .code, .btn svg,
            .cat-loaf, .cat-belly, .cat-sit, .cat-sit .tail,
            .cat-roll, .cat-walk, .cat-peek, .cat-belly .z,
            .cat-peek .pupil { animation: none; }
        }

        @media (max-width: 640px) {
            .cat-walk { display: none; }
            .cat-peek { top: -12px; }
        }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="blob a"></div>
        <div class="blob b"></div>
        <div class="blob c"></div>

        <!-- Peeking pusheen from top -->
        <svg class="cat cat-peek" viewBox="0 0 180 140" aria-hidden="true">
            <ellipse class="head" cx="90" cy="80" rx="78" ry="56"/>
            <polygon class="ear" points="36,36 30,12 62,30"/>
            <polygon class="ear" points="144,36 150,12 118,30"/>
            <rect class="stripe" x="60" y="36" width="6" height="18" rx="3"/>
            <rect class="stripe" x="78" y="30" width="6" height="22" rx="3"/>
            <rect class="stripe" x="96" y="30" width="6" height="22" rx="3"/>
            <rect class="stripe" x="114" y="36" width="6" height="18" rx="3"/>

            <ellipse class="eye pupil" cx="114" cy="86" rx="5" ry="7"/>
            <ellipse class="blush" cx="52" cy="100" rx="8" ry="5"/>
            <ellipse class="blush" cx="128" cy="100" rx="8" ry="5"/>
            <path class="mouth" d="M82 104 Q90 112 98 104"/>
        </svg>

        <div class="center">
            <div class="code">404</div>
            <div class="headline">This page wandered off.</div>
            <div class="sub">
                That path doesn't exist — probably a typo.
                Taking you back in <span class="countdown" id="count">5</span>s.
            </div>
            <a class="btn" href="/resume/" id="homeBtn">
                Go to Niko's resume
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M5 12h14M13 5l7 7-7 7"/>
                </svg>
            </a>
        </div>

        <!-- Loaf cat (bottom-left) -->
        <svg class="cat cat-loaf" viewBox="0 0 260 180" aria-hidden="true">
            <ellipse class="body" cx="130" cy="130" rx="110" ry="46"/>
            <polygon class="ear" points="62,78 54,50 88,74"/>
            <polygon class="ear" points="198,78 206,50 172,74"/>
            <ellipse class="head" cx="130" cy="96" rx="76" ry="52"/>
            <rect class="stripe" x="96" y="50" width="7" height="22" rx="3"/>
            <rect class="stripe" x="116" y="46" width="7" height="26" rx="3"/>
            <rect class="stripe" x="136" y="46" width="7" height="26" rx="3"/>
            <rect class="stripe" x="156" y="50" width="7" height="22" rx="3"/>
            <ellipse class="eye" cx="104" cy="102" rx="5" ry="7"/>
            <ellipse class="eye" cx="156" cy="102" rx="5" ry="7"/>
            <ellipse class="blush" cx="86" cy="118" rx="9" ry="5"/>
            <ellipse class="blush" cx="174" cy="118" rx="9" ry="5"/>
            <path class="mouth" d="M122 120 Q130 128 138 120"/>
            <!-- tail curled over body -->
            <path class="tail" d="M230 150 Q252 130 240 106 Q226 92 220 118" stroke="var(--cat-stripe)" stroke-width="1" fill="var(--cat)"/>
            <!-- front paws -->
            <ellipse class="paw" cx="100" cy="172" rx="14" ry="6"/>
            <ellipse class="paw" cx="160" cy="172" rx="14" ry="6"/>
        </svg>

        <!-- Belly-up sleeping cat (bottom-right) -->
        <svg class="cat cat-belly" viewBox="0 0 300 180" aria-hidden="true">
            <!-- body oval belly-up -->
            <ellipse class="body" cx="150" cy="124" rx="128" ry="42"/>
            <ellipse class="paw" cx="150" cy="128" rx="106" ry="26"/>
            <!-- head tilted right -->
            <polygon class="ear" points="228,66 232,40 252,66"/>
            <polygon class="ear" points="262,68 282,50 276,78"/>
            <ellipse class="head" cx="250" cy="96" rx="46" ry="40"/>
            <rect class="stripe" x="240" y="50" width="5" height="16" rx="2" transform="rotate(10 242 58)"/>
            <rect class="stripe" x="252" y="46" width="5" height="20" rx="2" transform="rotate(10 254 56)"/>
            <rect class="stripe" x="264" y="50" width="5" height="16" rx="2" transform="rotate(10 266 58)"/>
            <!-- closed eyes -->
            <path class="mouth" d="M232 96 Q236 100 240 96"/>
            <path class="mouth" d="M256 96 Q260 100 264 96"/>
            <ellipse class="blush" cx="228" cy="108" rx="6" ry="4"/>
            <ellipse class="blush" cx="270" cy="108" rx="6" ry="4"/>
            <!-- paws up -->
            <ellipse class="paw" cx="80" cy="74" rx="14" ry="22" transform="rotate(-18 80 74)"/>
            <ellipse class="paw" cx="118" cy="64" rx="14" ry="22" transform="rotate(-10 118 64)"/>
            <ellipse class="paw" cx="176" cy="68" rx="13" ry="20" transform="rotate(8 176 68)"/>
            <ellipse class="paw" cx="210" cy="80" rx="12" ry="18" transform="rotate(14 210 80)"/>
            <!-- tail draped -->
            <path class="tail" d="M40 120 Q10 140 20 168" stroke="var(--cat)" stroke-width="16" fill="none" stroke-linecap="round"/>
            <!-- Zs -->
            <text class="z"  x="228" y="40" font-size="18">z</text>
            <text class="z z2" x="244" y="28" font-size="22">z</text>
            <text class="z z3" x="262" y="14" font-size="26">z</text>
        </svg>

        <!-- Sitting pusheen (top-left) -->
        <svg class="cat cat-sit" viewBox="0 0 200 230" aria-hidden="true">
            <!-- tail behind -->
            <path class="tail" d="M140 180 Q180 150 160 118" stroke="var(--cat)" stroke-width="14" fill="none" stroke-linecap="round"/>
            <!-- body -->
            <ellipse class="body" cx="100" cy="170" rx="74" ry="52"/>
            <!-- head -->
            <polygon class="ear" points="44,60 38,32 72,58"/>
            <polygon class="ear" points="156,60 162,32 128,58"/>
            <ellipse class="head" cx="100" cy="92" rx="66" ry="52"/>
            <rect class="stripe" x="70" y="36" width="6" height="22" rx="3"/>
            <rect class="stripe" x="88" y="30" width="6" height="28" rx="3"/>
            <rect class="stripe" x="106" y="30" width="6" height="28" rx="3"/>
            <rect class="stripe" x="124" y="36" width="6" height="22" rx="3"/>
            <ellipse class="eye" cx="78" cy="98" rx="5" ry="7"/>
            <ellipse class="eye" cx="122" cy="98" rx="5" ry="7"/>
            <ellipse class="blush" cx="60" cy="114" rx="9" ry="5"/>
            <ellipse class="blush" cx="140" cy="114" rx="9" ry="5"/>
            <path class="mouth" d="M92 116 Q100 124 108 116"/>
            <!-- front paws -->
            <ellipse class="paw" cx="76" cy="214" rx="14" ry="10"/>
            <ellipse class="paw" cx="124" cy="214" rx="14" ry="10"/>
        </svg>

        <!-- Rolling pusheen (top-right) -->
        <svg class="cat cat-roll" viewBox="0 0 240 200" aria-hidden="true">
            <!-- body tilted -->
            <ellipse class="body" cx="120" cy="120" rx="98" ry="56" transform="rotate(-8 120 120)"/>
            <polygon class="ear" points="60,58 48,32 84,56"/>
            <polygon class="ear" points="176,62 188,36 152,56"/>
            <ellipse class="head" cx="120" cy="96" rx="64" ry="50"/>
            <rect class="stripe" x="90"  y="36" width="6" height="24" rx="3"/>
            <rect class="stripe" x="108" y="30" width="6" height="30" rx="3"/>
            <rect class="stripe" x="126" y="30" width="6" height="30" rx="3"/>
            <rect class="stripe" x="144" y="36" width="6" height="24" rx="3"/>
            <ellipse class="eye" cx="96"  cy="102" rx="5" ry="7"/>
            <ellipse class="eye" cx="144" cy="102" rx="5" ry="7"/>
            <ellipse class="blush" cx="78"  cy="118" rx="9" ry="5"/>
            <ellipse class="blush" cx="162" cy="118" rx="9" ry="5"/>
            <path class="mouth" d="M112 122 Q120 130 128 122"/>
            <!-- paws sticking out -->
            <ellipse class="paw" cx="48"  cy="168" rx="16" ry="9" transform="rotate(-10 48 168)"/>
            <ellipse class="paw" cx="94"  cy="180" rx="16" ry="9"/>
            <ellipse class="paw" cx="146" cy="180" rx="16" ry="9"/>
            <ellipse class="paw" cx="194" cy="168" rx="16" ry="9" transform="rotate(10 194 168)"/>
            <!-- curly tail -->
            <path class="tail" d="M214 120 Q238 108 222 86 Q210 76 206 100" fill="var(--cat)"/>
        </svg>

        <!-- Walking pusheen (mid, crosses screen) -->
        <svg class="cat cat-walk" viewBox="0 0 220 130" aria-hidden="true">
            <path class="tail" d="M190 80 Q216 62 206 38" stroke="var(--cat)" stroke-width="12" fill="none" stroke-linecap="round"/>
            <ellipse class="body" cx="110" cy="80" rx="84" ry="34"/>
            <polygon class="ear" points="48,44 40,18 74,40"/>
            <polygon class="ear" points="96,40 88,18 122,44"/>
            <ellipse class="head" cx="68" cy="60" rx="46" ry="38"/>
            <rect class="stripe" x="56" y="22" width="5" height="18" rx="2"/>
            <rect class="stripe" x="68" y="18" width="5" height="22" rx="2"/>
            <rect class="stripe" x="80" y="22" width="5" height="18" rx="2"/>
            <ellipse class="eye" cx="54" cy="64" rx="4" ry="6"/>
            <ellipse class="eye" cx="86" cy="64" rx="4" ry="6"/>
            <ellipse class="blush" cx="42" cy="76" rx="7" ry="4"/>
            <ellipse class="blush" cx="98" cy="76" rx="7" ry="4"/>
            <path class="mouth" d="M66 80 Q70 84 74 80"/>
            <ellipse class="paw" cx="60"  cy="116" rx="10" ry="6"/>
            <ellipse class="paw" cx="100" cy="116" rx="10" ry="6"/>
            <ellipse class="paw" cx="148" cy="116" rx="10" ry="6"/>
            <ellipse class="paw" cx="188" cy="116" rx="10" ry="6"/>
        </svg>

        <div class="footer">nikoescobal.github.io</div>
    </div>

    <script>
        var n = 5;
        var el = document.getElementById('count');
        var timer = setInterval(function () {
            n -= 1;
            if (n <= 0) {
                clearInterval(timer);
                window.location.href = '/resume/';
            } else {
                el.textContent = n;
            }
        }, 1000);
    </script>
</body>
</html>
